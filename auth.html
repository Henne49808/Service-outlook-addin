<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Hedelius – Anmeldung</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #faf9f8;
            color: #323130;
        }
        .logo { width: 180px; margin-bottom: 24px; }
        .status { font-size: 14px; color: #605e5c; margin-top: 12px; text-align: center; max-width: 440px; }
        .error { color: #a80000; background: #fde7e9; padding: 12px; border-radius: 4px; border-left: 4px solid #a80000; max-width: 440px; margin-top: 16px; }
        .loader { border: 3px solid #f3f2f1; border-top: 3px solid #0078d4; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img src="hedelius_logo.png" alt="Hedelius" class="logo">
    <div class="loader" id="loader"></div>
    <p class="status" id="status">Anmeldung wird verarbeitet...</p>
    <div id="error-box" style="display:none" class="error"></div>

    <script>
        const msalConfig = {
            auth: {
                clientId: "8d7de9fa-b100-4963-9873-28f5daacf2ee",
                authority: "https://login.microsoftonline.com/0eb9b61a-77ec-433c-9c80-d09668b40aab",
                redirectUri: "https://henne49808.github.io/Service-outlook-addin/auth.html"
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const loginRequest = {
            scopes: ["https://hedelius.api.crm4.dynamics.com/user_impersonation"],
            prompt: "select_account"
        };

        function isOfficeDialog() {
            return !!(window.Office && Office.context && Office.context.ui && Office.context.ui.messageParent);
        }

        function sendMessageToTaskpane(payload) {
            const json = JSON.stringify(payload);

            if (isOfficeDialog()) {
                Office.context.ui.messageParent(json);
                return true;
            }

            return false;
        }

        function storeTokenLocally(result) {
            localStorage.setItem("lfp_access_token", result.accessToken);
            localStorage.setItem("lfp_token_expiry", result.expiresOn.getTime().toString());
            localStorage.setItem("lfp_account", JSON.stringify(result.account || {}));
        }

        function finishSuccess(result) {
            document.getElementById("status").innerText = "Anmeldung erfolgreich. Fenster wird geschlossen...";

            const messageSent = sendMessageToTaskpane({
                type: "auth_success",
                accessToken: result.accessToken,
                expiresOn: result.expiresOn.getTime(),
                account: result.account || {}
            });

            // Fallback fuer direkten Aufruf ausserhalb der Office Dialog API.
            if (!messageSent) {
                storeTokenLocally(result);
                setTimeout(() => { window.close(); }, 500);
            }
        }

        function showError(msg) {
            document.getElementById("loader").style.display = "none";
            document.getElementById("status").style.display = "none";
            document.getElementById("error-box").style.display = "block";
            document.getElementById("error-box").innerText = "Fehler: " + msg;

            sendMessageToTaskpane({
                type: "auth_error",
                message: msg
            });
        }

        async function run() {
            const msalInstance = new msal.PublicClientApplication(msalConfig);

            try {
                const result = await msalInstance.handleRedirectPromise();

                if (result && result.accessToken) {
                    finishSuccess(result);
                    return;
                }

                document.getElementById("status").innerText = "Weiterleitung zur Anmeldung...";

                const accounts = msalInstance.getAllAccounts();

                if (accounts.length > 0) {
                    try {
                        const silentResult = await msalInstance.acquireTokenSilent({
                            ...loginRequest,
                            account: accounts[0]
                        });
                        finishSuccess(silentResult);
                        return;
                    } catch (_) {
                        await msalInstance.acquireTokenRedirect(loginRequest);
                        return;
                    }
                }

                await msalInstance.acquireTokenRedirect(loginRequest);
            } catch (error) {
                showError(error.message || String(error));
            }
        }

        if (window.Office && Office.onReady) {
            Office.onReady(() => run());
        } else {
            run();
        }
    </script>
</body>
</html>
