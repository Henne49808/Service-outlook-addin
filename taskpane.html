<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            font-size: 14px; color: #323130; background-color: #faf9f8;
            margin: 0; padding: 0; box-sizing: border-box;
            display: flex; flex-direction: column; height: 100vh;
            width: 100%;
        }
        
        #addin-header {
            background-color: #ffffff; 
            padding: 8px 12px; 
            border-bottom: 1px solid #edebe9;
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-shrink: 0;
            width: 100%; 
            box-sizing: border-box;
        }
        #addin-header img.logo { 
            height: 24px; 
            width: auto; 
        }
        #addin-header h1.title { 
            font-size: 13px; 
            font-weight: 600; 
            color: #323130; 
            margin: 0; 
        }

        #main-content { padding: 12px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; flex-grow: 1; box-sizing: border-box; }
        h2 { font-size: 14px; font-weight: 600; color: #0078d4; margin: 0 0 8px 0; border-bottom: 1px solid #edebe9; padding-bottom: 4px; }
        .section { background: #ffffff; border-radius: 2px; padding: 12px; box-shadow: 0 1.6px 3.6px 0 rgba(0,0,0,0.132), 0 0.3px 0.9px 0 rgba(0,0,0,0.108); box-sizing: border-box; }
        .field-group { margin-bottom: 10px; }
        .field-label { font-size: 11px; font-weight: 600; color: #605e5c; text-transform: uppercase; }
        .field-value { font-size: 13px; color: #323130; margin-top: 2px; word-break: break-word; }
        input[type="text"], textarea { width: 100%; padding: 6px 8px; border: 1px solid #a19f9d; border-radius: 2px; box-sizing: border-box; font-family: inherit; margin-top: 4px; }
        .btn { display: block; width: 100%; padding: 8px 16px; margin-bottom: 8px; border-radius: 2px; border: 1px solid transparent; font-weight: 600; cursor: pointer; text-align: center; font-size: 13px; box-sizing: border-box; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background-color: #0078d4; color: #ffffff; }
        .btn-primary:hover:not(:disabled) { background-color: #106ebe; }
        .btn-secondary { background-color: #f3f2f1; color: #323130; border-color: #8a8886; }
        .btn-secondary:hover:not(:disabled) { background-color: #edebe9; }

        #btn-save-complete {
            background-color: #107c41;
            color: #ffffff;
            border-color: #107c41;
            box-shadow: 0 1px 3px rgba(16, 124, 65, 0.35);
        }
        #btn-save-complete:hover:not(:disabled) {
            background-color: #0b6a35;
            border-color: #0b6a35;
        }
        .button-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .button-row .btn { flex: 1; margin-bottom: 0; }
        .hidden { display: none !important; }
        #status-message { padding: 10px; border-radius: 2px; font-weight: 500; margin-bottom: 10px; }
        .status-error { background-color: #fde7e9; color: #a80000; border-left: 4px solid #a80000; }
        .status-success { background-color: #dff6dd; color: #107c41; border-left: 4px solid #107c41; }
        .loader { border: 3px solid #f3f2f1; border-top: 3px solid #0078d4; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #login-container { text-align: center; padding: 24px 16px; }
        #login-container p { color: #605e5c; font-size: 13px; margin-bottom: 16px; }
        #login-link-container { margin-top: 12px; font-size: 12px; color: #605e5c; }
        #login-link-container a { color: #0078d4; }

        .readonly-row { display: grid; grid-template-columns: 42% 58%; gap: 8px; padding: 6px 0; border-bottom: 1px solid #edebe9; }
        .readonly-row:last-child { border-bottom: 0; }
        .readonly-label { font-size: 12px; font-weight: 600; color: #605e5c; }
        .readonly-value { font-size: 13px; color: #323130; word-break: break-word; }
        .required-marker { color: #a80000; margin-left: 3px; }
        select { width: 100%; padding: 6px 8px; border: 1px solid #a19f9d; border-radius: 2px; box-sizing: border-box; font-family: inherit; margin-top: 4px; background: #fff; }
        .description-box { margin-top: 8px; }
        .description-edit { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #d0d0d0; border-radius: 2px; background: #fafafa; min-height: 120px; max-height: 280px; overflow-y: auto; line-height: 1.45; resize: vertical; font-family: inherit; }
        
        /* --- KOMPLETT REPARIERTER HEADER-BEREICH --- */
        .ticket-header-card {
            display: flex;             /* Von Grid auf Flexbox umgestellt für bessere Kontrolle */
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid #edebe9;
            border-radius: 6px;
            padding: 10px;
            background: #ffffff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            box-sizing: border-box;
            width: 100%;
        }
        .ticket-header-left {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            flex: 1;                  /* Nimmt den restlichen Platz ein */
            min-width: 0;             /* ZWINGEND ERFORDERLICH gegen den vertikalen Buchstaben-Umbruch */
        }
        .ticket-header-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8f1fb;
            color: #005a9e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .ticket-header-main { 
            min-width: 0;             /* Sichert die Unterelemente ab */
            width: 100%;
        }
        
        .ticket-title-main {
            font-size: 13px;          /* Noch ein Stück kleiner für extrem schmale Ansichten */
            font-weight: 600;
            color: #201f1e;
            margin: 0 0 4px 0;
            white-space: nowrap;      /* Verhindert den Umbruch in einzelne Buchstaben */
            overflow: hidden;         /* Schneidet Text ab, falls das Fenster zu klein ist */
            text-overflow: ellipsis;  /* Fügt "..." am Ende des Titels an */
        }
        .ticket-subtitle {
            font-size: 11px;
            color: #605e5c;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;  /* Auch die Ticket-ID bekommt ein "..." statt Buchstaben-Salat */
        }
        .ticket-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #dff6dd;
            color: #107c41;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 999px;
            font-size: 11px;
        }
        .ticket-status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #107c41;
            display: inline-block;
        }
        
        .ticket-header-right {
            border-left: 1px solid #edebe9;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;           /* Lässt die rechte Spalte niemals zusammendrücken */
            text-align: left;
        }
        .ticket-side-label {
            font-size: 10px;
            color: #605e5c;
            margin-bottom: 1px;
            white-space: nowrap;
        }
        .ticket-side-value {
            font-size: 11px;
            color: #201f1e;
            white-space: nowrap;
        }
        .ticket-priority-badge {
            display: inline-block;
            background: #fff4ce;
            color: #8a5800;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;      /* Garantiert einzeilige Priorität */
        }

        .lookup-field-group { position: relative; }
        .lookup-dropdown {
            position: absolute;
            z-index: 1000;
            left: 0;
            right: 0;
            margin-top: 2px;
            background: #ffffff;
            border: 1px solid #605e5c;
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
            max-height: 220px;
            overflow-y: auto;
        }
        .lookup-result {
            display: block;
            width: 100%;
            padding: 7px 9px;
            border: 0;
            background: #ffffff;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }
        .lookup-result:hover { background: #f3f2f1; }
        .lookup-result-main { display: block; color: #201f1e; font-size: 13px; }
        .lookup-result-sub { display: block; color: #605e5c; font-size: 12px; margin-top: 2px; }
        .lookup-empty { padding: 8px 9px; color: #605e5c; font-size: 12px; }
        .lookup-clear {
            margin-top: 4px;
            border: 0;
            background: transparent;
            color: #0078d4;
            padding: 0;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* Überschreibt alte Inline-Klassen am Ende */
        .ticket-header{padding:8px 10px!important;gap:10px!important}
        .ticket-title{font-size:13px!important;font-weight:600!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
        .ticket-sub{font-size:11px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
        .ticket-badge{font-size:11px!important;padding:2px 6px!important}
